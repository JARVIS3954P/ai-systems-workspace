<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f4f4f4;
            transition: background 0.3s ease;
        }

        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 1rem auto;
        }

        .buttons button {
            margin-right: 0.5rem;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        .buttons button:nth-child(1) { background: #3498db; }
        .buttons button:nth-child(2) { background: #2ecc71; }
        .buttons button:nth-child(3) { background: #e74c3c; }

        input {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.5rem;
        }

        .count {
            margin-top: 0.4rem;
            color: #555;
        }

        ul {
            padding-left: 1.2rem;
        }

        li {
            cursor: pointer;
            margin: 0.4rem 0;
            padding: 0.3rem 0;
        }

        li:hover {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>DOM Practice</h2>

        <section>
            <h3>1. Change Background Color</h3>
            <div class="buttons">
                <button data-color="#3498db">Blue</button>
                <button data-color="#2ecc71">Green</button>
                <button data-color="#e74c3c">Red</button>
            </div>
        </section>

        <section style="margin-top: 1.5rem;">
            <h3>2. Live Character Count</h3>
            <input type="text" id="textInput" placeholder="Type something...">
            <div id="count" class="count">0 characters</div>
        </section>

        <section style="margin-top: 1.5rem;">
            <h3>3. Click to Remove Items</h3>
            <ul id="itemList">
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
                <li>React</li>
                <li>Node.js</li>
            </ul>
        </section>
    </div>

    <script>
        document.querySelectorAll('.buttons button').forEach((button) => {
            button.addEventListener('click', () => {
                document.body.style.backgroundColor = button.getAttribute('data-color');
            });
        });

        const input = document.getElementById('textInput');
        const count = document.getElementById('count');

        input.addEventListener('input', () => {
            count.textContent = `${input.value.length} characters`;
        });

        const itemList = document.getElementById('itemList');

        itemList.addEventListener('click', (event) => {
            const item = event.target.closest('li');
            if (item) {
                item.remove();
            }
        });
    </script>
</body>
</html>
