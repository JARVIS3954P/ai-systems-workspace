<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> API Request</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        article {
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 16px;
            background-color: white;
        }

        img {
            width: 100%;
            border-radius: 8px;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            color: #555;
        }

        ul {
            padding-left: 20px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background-color: royalblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: dodgerblue;
        }
    </style>
</head>
<body style="background-color: #212121;">
    
    <article>
        <header>
            <h2 id="card-title">Loading...</h2>
        </header>

        <section>
            <p id="card-description">Fetching Details</p>
        </section>

        <footer>
            <button>View Details</button>
        </footer>
    </article>
</body>
<script>
    const requestUrl = "https://api.restful-api.dev/objects";

    const xhr = new XMLHttpRequest();

    xhr.open("GET", requestUrl);

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

            if (xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);
                console.log(data);
            } else {
                console.error("Request failed:", xhr.status, xhr.responseText);
            }
        }
    };

    xhr.send();
</script>
</html>
