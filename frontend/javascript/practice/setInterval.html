<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HeLLo WoRlD</h1>
    <button id="start">START</button>
    <button id="stop">STOP</button>
</body>
<script>
/*
setInterval is used to run a function repeatedly after a certain interval of time
Syntax: setInterval(function, milliseconds, param1, param2, ...)
*/
    let intervalId = null; //setInterval returns an ID that can be used to clear the interval later

    const sayDate = function(str){
        console.log(str, Date.now());
    };

    document.querySelector('#start').addEventListener('click', function(){
        if (!intervalId) {
            intervalId = setInterval(sayDate, 2000, "Current Time : "); 
        }
    });

    document.querySelector('#stop').addEventListener('click', function(){
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
    });
</script>
</html>
